<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <center>
            <h2>Registration Form</h2>
        </center>

        <form action="regs.php" method="POST">

            <label>Name</label>
            <input type="text" name="name" required>

            <label>Contact Number</label>
            <input type="tel" name="contact" required pattern="[0-9]{10}" maxlength="10">

            <label>Email Address</label>
            <input type="email" name="email" required title="Please enter a valid email address">

            <label>Password</label>
            <input type="password" name="password" required
                title="Password must contain at least 8 characters, one uppercase letter, one lowercase letter, and one number">

            <label>Bio</label>
            <input type="text" name="bio" required>

            <label>Date of Birth</label>
            <input type="date" id="date" name="date">


            <button type="submit" name="Register">Register</button>



        </form>
    </div>

</body>

</html>
